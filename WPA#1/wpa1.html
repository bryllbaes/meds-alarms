<!DOCTYPE html>
<html>

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <title>Meds Alarms for my Baby</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            background: #764ba200 100%;
            padding: 20px;
        }
        
        .alarm-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            color: #c01a1a;
            margin: 0 0 20px 0;
            text-align: center;
        }
        
        .alarm-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .alarm-item {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .alarm-info {
            text-align: left;
        }
        
        .alarm-time {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .alarm-label {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        .alarm-status {
            font-size: 12px;
            color: #667eea;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #ff5252;
        }
        
        .add-alarm-section {
            border-top: 2px solid #eee;
            padding-top: 20px;
            margin-top: 20px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
        }
        
        .time-picker {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .time-column {
            text-align: center;
        }
        
        .time-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .scroll-picker {
            width: 60px;
            height: 150px;
            border: 2px solid #667eea;
            border-radius: 5px;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        
        .scroll-option {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }
        
        .scroll-option.selected {
            color: #667eea;
            background: #f5f5f5;
        }
        
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .no-alarms {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
    </style>
</head>

<body>
    <div class="alarm-container">
        <h1>Medicine Alarm</h1>
        
        <div class="alarm-list" id="alarmList">
            <div class="no-alarms">No alarms set</div>
        </div>
        
        <div class="add-alarm-section">
            <input type="text" id="alarmLabel" placeholder="Alarm name (e.g., Morning Medicine)">
            
            <div class="time-picker">
                <div class="time-column">
                    <div class="time-label">Hours</div>
                    <div class="scroll-picker" id="hoursPicker"></div>
                </div>
                <div class="time-column">
                    <div class="time-label">Minutes</div>
                    <div class="scroll-picker" id="minutesPicker"></div>
                </div>
                <div class="time-column">
                    <div class="time-label">Seconds</div>
                    <div class="scroll-picker" id="secondsPicker"></div>
                </div>
            </div>
            
            <button onclick="setAlarm()">Set Alarm</button>
        </div>
    </div>
    
    <script src="alarm.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
